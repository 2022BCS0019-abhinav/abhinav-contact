<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abhinav</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Georgia', serif;
    background: #f5f3ef;
    color: #1a1a1a;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  .wrap {
    width: 100%;
    max-width: 360px;
  }

  /* Header */
  .header {
    margin-bottom: 48px;
  }

  .monogram {
    width: 52px;
    height: 52px;
    border: 1.5px solid #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-family: 'Georgia', serif;
    letter-spacing: 1px;
    margin-bottom: 24px;
  }

  .header h1 {
    font-size: 32px;
    font-weight: normal;
    letter-spacing: -0.5px;
    line-height: 1;
    margin-bottom: 8px;
  }

  .header p {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    font-size: 12px;
    color: #888;
    letter-spacing: 0.5px;
  }

  /* Rule */
  .rule {
    height: 1px;
    background: #d8d5cf;
    margin-bottom: 32px;
  }

  /* Contact row */
  .contact {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    padding: 22px 0;
    border-bottom: 1px solid #d8d5cf;
  }

  .contact:first-of-type {
    border-top: 1px solid #d8d5cf;
  }

  .contact-left {}

  .contact-type {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 6px;
  }

  .contact-name {
    font-size: 17px;
    font-weight: normal;
    margin-bottom: 3px;
  }

  .contact-number {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    font-size: 13px;
    color: #555;
    letter-spacing: 0.3px;
  }

  .save-btn {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: none;
    border: 1px solid #1a1a1a;
    color: #1a1a1a;
    padding: 9px 16px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    white-space: nowrap;
    margin-top: 4px;
    flex-shrink: 0;
    align-self: center;
  }

  .save-btn:hover {
    background: #1a1a1a;
    color: #f5f3ef;
  }

  .save-btn.saved {
    background: #1a1a1a;
    color: #f5f3ef;
  }

  /* Footer */
  .footer {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    font-size: 11px;
    color: #aaa;
    margin-top: 32px;
    letter-spacing: 0.3px;
  }
</style>
</head>
<body>

<div class="wrap">

  <div class="header">
    <div class="monogram">A</div>
    <h1>Abhinav Bhagwat</h1>
    <p>Save contact to your phone</p>
  </div>

  <div class="rule"></div>

  <div class="contact">
    <div class="contact-left">
      <div class="contact-type">Personal · WhatsApp Only</div>
      <div class="contact-name">Abhinav Personal</div>
      <div class="contact-number">+91 89583 93798</div>
    </div>
    <button class="save-btn" id="btn-personal" onclick="saveContact('personal')">Save</button>
  </div>

  <div class="contact">
    <div class="contact-left">
      <div class="contact-type">Work · Call and WhatsApp</div>
      <div class="contact-name">Abhinav HPE</div>
      <div class="contact-number">+91 93105 80199</div>
    </div>
    <button class="save-btn" id="btn-work" onclick="saveContact('work')">Save</button>
  </div>

  <div class="footer">Tap Save to download the contact card</div>

</div>

<script>
  var vcards = {
    personal: 'BEGIN:VCARD\r\nVERSION:3.0\r\nFN:Abhinav (Personal)\r\nTEL;TYPE=CELL:+918958393798\r\nEND:VCARD',
    work:     'BEGIN:VCARD\r\nVERSION:3.0\r\nFN:Abhinav (Work)\r\nTEL;TYPE=WORK:+919310580199\r\nEND:VCARD'
  };

  function saveContact(type) {
    var blob = new Blob([vcards[type]], { type: 'text/vcard' });
    var url  = URL.createObjectURL(blob);
    var a    = document.createElement('a');
    a.href     = url;
    a.download = type === 'personal' ? 'Abhinav_Personal.vcf' : 'Abhinav_Work.vcf';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    var btn = document.getElementById('btn-' + type);
    btn.innerHTML = 'Saved ✓';
    btn.classList.add('saved');
    setTimeout(function() {
      btn.innerHTML = 'Save';
      btn.classList.remove('saved');
    }, 3000);
  }
</script>

</body>
</html>
