<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abhinav – Save Contact</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --border: #22223a;
    --text: #f0eefc;
    --muted: #7b7a9c;
    --personal: #25d366;
    --work: #0088cc;
    --glow-personal: rgba(37,211,102,0.18);
    --glow-work: rgba(0,136,204,0.18);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 20%, rgba(37,211,102,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 80% 80%, rgba(0,136,204,0.08) 0%, transparent 60%);
    pointer-events: none;
  }

  .card-wrap {
    width: 100%;
    max-width: 400px;
    display: flex;
    flex-direction: column;
    gap: 0;
    animation: rise 0.7s cubic-bezier(.22,.68,0,1.2) both;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(28px) scale(0.97); }
    to   { opacity: 1; transform: none; }
  }

  .header {
    text-align: center;
    margin-bottom: 32px;
  }

  .avatar {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: linear-gradient(135deg, #25d366 0%, #0088cc 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    color: #fff;
    margin: 0 auto 16px;
    box-shadow: 0 0 0 4px var(--border), 0 8px 32px rgba(37,211,102,0.2);
  }

  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    letter-spacing: -0.5px;
  }

  .header p {
    color: var(--muted);
    font-size: 13px;
    margin-top: 6px;
    font-weight: 300;
  }

  .contact-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .contact-card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 20px;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .contact-card.personal::before { background: var(--glow-personal); }
  .contact-card.work::before     { background: var(--glow-work); }

  .contact-card:hover { transform: translateY(-2px); }
  .contact-card:hover::before { opacity: 1; }
  .contact-card.personal:hover { box-shadow: 0 8px 32px var(--glow-personal); }
  .contact-card.work:hover     { box-shadow: 0 8px 32px var(--glow-work); }

  .card-top {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 20px;
  }

  .icon {
    width: 48px;
    height: 48px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }

  .personal .icon { background: rgba(37,211,102,0.15); }
  .work .icon     { background: rgba(0,136,204,0.15); }

  .card-info {}
  .card-label {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    margin-bottom: 3px;
  }
  .personal .card-label { color: var(--personal); }
  .work .card-label     { color: var(--work); }

  .card-name {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
  }
  .card-number {
    color: var(--muted);
    font-size: 13px;
    margin-top: 2px;
    font-weight: 300;
    letter-spacing: 0.5px;
  }

  .save-btn {
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .save-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: white;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .save-btn:active::after { opacity: 0.1; }

  .personal .save-btn {
    background: var(--personal);
    color: #fff;
    box-shadow: 0 4px 20px rgba(37,211,102,0.35);
  }
  .personal .save-btn:hover { box-shadow: 0 6px 28px rgba(37,211,102,0.5); transform: scale(1.01); }

  .work .save-btn {
    background: var(--work);
    color: #fff;
    box-shadow: 0 4px 20px rgba(0,136,204,0.35);
  }
  .work .save-btn:hover { box-shadow: 0 6px 28px rgba(0,136,204,0.5); transform: scale(1.01); }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 4px 0 20px;
  }

  .footer {
    text-align: center;
    color: var(--muted);
    font-size: 11px;
    margin-top: 12px;
    font-weight: 300;
  }

  .tick { display: inline-block; transition: transform 0.3s; }
  .saved .tick { transform: scale(1.3); }
</style>
</head>
<body>

<div class="card-wrap">

  <div class="header">
    <div class="avatar">A</div>
    <h1>Abhinav</h1>
    <p>Tap below to save contacts instantly</p>
  </div>

  <!-- Personal WhatsApp -->
  <div class="contact-card personal">
    <div class="card-top">
      <div class="icon">📱</div>
      <div class="card-info">
        <div class="card-label">Personal WhatsApp</div>
        <div class="card-name">Abhinav</div>
        <div class="card-number">+91 89583 93798</div>
      </div>
    </div>
    <div class="divider"></div>
    <button class="save-btn" onclick="saveContact('personal', this)">
      <span class="tick">✦</span> Save Personal Contact
    </button>
  </div>

  <!-- Work Call -->
  <div class="contact-card work">
    <div class="card-top">
      <div class="icon">📞</div>
      <div class="card-info">
        <div class="card-label">Work Call</div>
        <div class="card-name">Abhinav</div>
        <div class="card-number">+91 93105 80199</div>
      </div>
    </div>
    <div class="divider"></div>
    <button class="save-btn" onclick="saveContact('work', this)">
      <span class="tick">✦</span> Save Work Contact
    </button>
  </div>

  <div class="footer">Scan once · Save both · Done ✓</div>
</div>

<script>
  const vcards = {
    personal: `BEGIN:VCARD
VERSION:3.0
FN:Abhinav (Personal)
N:;Abhinav (Personal);;;
TEL;TYPE=CELL,PREF:+918958393798
X-SOCIALPROFILE;TYPE=whatsapp:+918958393798
END:VCARD`,

    work: `BEGIN:VCARD
VERSION:3.0
FN:Abhinav (Work)
N:;Abhinav (Work);;;
TEL;TYPE=WORK,VOICE:+919310580199
END:VCARD`
  };

  const labels = {
    personal: 'Abhinav_Personal.vcf',
    work: 'Abhinav_Work.vcf'
  };

  function saveContact(type, btn) {
    const blob = new Blob([vcards[type]], { type: 'text/vcard;charset=utf-8' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = labels[type];
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    // Visual feedback
    const tick = btn.querySelector('.tick');
    const orig = btn.innerHTML;
    btn.innerHTML = '<span class="tick">✓</span> Saved!';
    btn.style.opacity = '0.85';
    setTimeout(() => {
      btn.innerHTML = orig;
      btn.style.opacity = '';
    }, 2500);
  }
</script>
</body>
</html>
